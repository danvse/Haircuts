<!DOCTYPE html>
<html>
<head>
  <title>Haircut Classifier</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 40px; }
    .chopped { color: red; font-size: 48px; font-weight: bold; }
    .good { color: green; font-size: 36px; }
  </style>
</head>
<body>

<h1>Upload Your Haircut</h1>

<input type="file" id="fileInput">
<button onclick="upload()">Submit</button>

<div id="result"></div>

<script>
async function upload() {
  const file = document.getElementById("fileInput").files[0];
  const form = new FormData();
  form.append("file", file);

  const res = await fetch("http://localhost:8000/classify", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  if (data.status === "bad") {
    document.getElementById("result").innerHTML =
      "<div class='chopped'>YOU'RE CHOPPED</div>";
  } else {
    document.getElementById("result").innerHTML =
      "<div class='good'>Good haircut: " + data.haircut + "</div>";
  }
}
</script>

</body>
</html>
