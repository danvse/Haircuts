<!DOCTYPE html>
<html>
<head>
    <title>Haircut Classifier</title>
    <style>
        #dropbox {
            width: 300px;
            height: 200px;
            border: 3px dashed #555;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px auto;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Upload Your Haircut</h2>

<div id="dropbox">Drop image here</div>
<input type="file" id="fileInput" style="display:none;" />

<pre id="result" style="text-align:center; margin-top:20px;"></pre>

<script>
const dropbox = document.getElementById("dropbox");
const fileInput = document.getElementById("fileInput");
const resultBox = document.getElementById("result");

// Click dropbox to open file picker
dropbox.addEventListener("click", () => fileInput.click());

// Handle manual file selection
fileInput.addEventListener("change", () => {
    uploadAndClassify(fileInput.files[0]);
});

// Handle drag/drop
dropbox.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropbox.style.borderColor = "blue";
});

dropbox.addEventListener("dragleave", () => {
    dropbox.style.borderColor = "#555";
});

dropbox.addEventListener("drop", (e) => {
    e.preventDefault();
    dropbox.style.borderColor = "#555";

    const file = e.dataTransfer.files[0];
    uploadAndClassify(file);
});

// Upload + classify
async function uploadAndClassify(file) {
    const formData = new FormData();
    formData.append("file", file);

    resultBox.textContent = "Processing...";

    const response = await fetch("http://localhost:5000/classify", {
        method: "POST",
        body: formData
    });

    const result = await response.json();
    resultBox.textContent = JSON.stringify(result, null, 2);
}
</script>

</body>
</html>
